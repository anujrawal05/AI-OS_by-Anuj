<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #090a0f;
      --bg-card: #12141c;
      --bg-sidebar: #0f1118;
      --border-color: #1e2230;
      
      --accent-green: #00ff88;
      --accent-blue: #00f0ff;
      --accent-purple: #9d4edd;
      --accent-pink: #ff007f;
      
      --text-main: #f3f4f6;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      
      --font-sans: 'Outfit', sans-serif;
      --font-mono: 'Space Mono', monospace;
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: var(--font-sans);
      overflow: hidden;
      height: 100vh;
      display: flex;
    }

    /* Left Sidebar */
    .sidebar {
      width: 320px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      height: 100%;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 24px;
      border-bottom: 1px solid var(--border-color);
    }

    .sidebar-title {
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-mono);
    }

    .sidebar-title span {
      background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sidebar-subtitle {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 4px;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .ideas-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Scrollbar */
    .ideas-list::-webkit-scrollbar,
    .main-content::-webkit-scrollbar {
      width: 6px;
    }
    .ideas-list::-webkit-scrollbar-track,
    .main-content::-webkit-scrollbar-track {
      background: transparent;
    }
    .ideas-list::-webkit-scrollbar-thumb,
    .main-content::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 3px;
    }

    .idea-card-trigger {
      background: transparent;
      border: 1px solid transparent;
      padding: 16px;
      border-radius: 12px;
      text-align: left;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
      outline: none;
    }

    .idea-card-trigger:hover {
      background: rgba(255, 255, 255, 0.02);
      border-color: rgba(255, 255, 255, 0.05);
    }

    .idea-card-trigger.active {
      background: rgba(0, 255, 136, 0.03);
      border-color: rgba(0, 255, 136, 0.2);
    }

    .idea-card-trigger-title {
      font-size: 0.92rem;
      font-weight: 700;
      color: #fff;
      transition: var(--transition);
    }

    .idea-card-trigger.active .idea-card-trigger-title {
      color: var(--accent-green);
    }

    .idea-card-trigger-desc {
      font-size: 0.76rem;
      color: var(--text-secondary);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Main Display Panel */
    .main-content {
      flex: 1;
      height: 100%;
      overflow-y: auto;
      padding: 40px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      background: radial-gradient(circle at 10% 20%, rgba(18, 20, 28, 0.4) 0%, rgba(9, 10, 15, 0) 100%);
    }

    /* Top Grid metrics */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .metric-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: var(--transition);
    }

    .metric-card:hover {
      border-color: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    .metric-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      font-family: var(--font-mono);
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .metric-value {
      font-size: 1.4rem;
      font-weight: 900;
      color: #fff;
    }

    .metric-card.profit { border-left: 3px solid var(--accent-green); }
    .metric-card.setup { border-left: 3px solid var(--accent-blue); }
    .metric-card.opex { border-left: 3px solid var(--accent-purple); }

    /* Content Cards layout */
    .blueprint-header {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .blueprint-badge {
      display: inline-flex;
      align-self: flex-start;
      background: rgba(0, 240, 255, 0.08);
      border: 1px solid rgba(0, 240, 255, 0.15);
      color: var(--accent-blue);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      padding: 4px 10px;
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .blueprint-title {
      font-size: 2.2rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.02em;
    }

    .blueprint-description {
      font-size: 1.05rem;
      color: var(--text-secondary);
      line-height: 1.6;
      max-width: 850px;
    }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }

    .detail-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: var(--transition);
    }

    .detail-card:hover {
      border-color: rgba(255, 255, 255, 0.06);
    }

    .detail-title {
      font-size: 0.8rem;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent-green);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .detail-content {
      font-size: 0.92rem;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    .detail-content strong {
      color: #fff;
    }

    /* Checklist Card block span */
    .detail-card.span-2 {
      grid-column: span 2;
    }

    .checklist-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 6px;
    }

    .checklist-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid rgba(255, 255, 255, 0.02);
      transition: var(--transition);
    }

    .checklist-row:hover {
      background: rgba(255, 255, 255, 0.02);
      border-color: rgba(255, 255, 255, 0.04);
    }

    .checklist-checkbox {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 2px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 3px;
      cursor: pointer;
      transition: var(--transition);
      flex-shrink: 0;
    }

    .checklist-checkbox.checked {
      background: var(--accent-green);
      border-color: var(--accent-green);
    }

    .checklist-checkbox::after {
      content: '';
      width: 8px;
      height: 4px;
      border-left: 2px solid #000;
      border-bottom: 2px solid #000;
      transform: rotate(-45deg) translateY(-1px);
      opacity: 0;
      transition: var(--transition);
    }

    .checklist-checkbox.checked::after {
      opacity: 1;
    }

    .checklist-text {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .checklist-checkbox.checked + .checklist-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    /* Animation wrappers */
    .fade-element {
      animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

        triggerContainer.appendChild(btn);
        isFirst = false;

          <div class="detail-card">
            <div class="detail-title">🤝 Sales & Pitching Protocol</div>
            <div class="detail-content">${data.sales}</div>
          </div>

          <div class="detail-card">
            <div class="detail-title">⏱️ Time to First Revenue</div>
            <div class="detail-content">${data.timeline}</div>
          </div>

          <div class="detail-card">
            <div class="detail-title">⚠️ Vulnerabilities & Risk Mitigation</div>
            <div class="detail-content">${data.risks}</div>
          </div>

          <div class="detail-card span-2">
            <div class="detail-title" style="color: var(--accent-blue);">📋 Sequential Action Checklist</div>
            <div class="checklist-container">
              ${data.checklist.map((step, i) => `
                <div class="checklist-row">
                  <div class="checklist-checkbox" onclick="toggleCheck(this)"></div>
                  <div class="checklist-text">${i + 1}. ${step}</div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `;
    }

    function toggleCheck(el) {
      el.classList.toggle('checked');
    }

    // Run on startup
    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
